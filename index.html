<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Shopping Cart App | Fast, Modern E-Commerce UI</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="A modern React Shopping Cart application with dynamic UI, fast performance, and seamless user experience. Built using React, Tailwind CSS, and optimized for scalability."
    />
    <meta
      name="keywords"
      content="React Shopping Cart, E-commerce React App, Tailwind CSS UI, Frontend Project, React Developer Portfolio"
    />
    <meta name="author" content="Deep Sharma" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Theme -->
    <meta name="theme-color" content="#06b6d4" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="React Shopping Cart App" />
    <meta
      property="og:description"
      content="Modern React-based shopping cart with smooth UI and fast performance."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="https://yourdomain.com/preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="React Shopping Cart App" />
    <meta
      name="twitter:description"
      content="Fast and modern shopping cart built using React and Tailwind CSS."
    />
    <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optional Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Structured Data (BONUS for SEO 🚀) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "React Shopping Cart",
        "url": "https://yourdomain.com/",
        "description": "A modern React shopping cart application with smooth UI and fast performance.",
        "applicationCategory": "ShoppingApplication",
        "operatingSystem": "Web",
        "author": {
          "@type": "Person",
          "name": "Deep Sharma"
        }
      }
    </script>
  </head>

  <body>
    <noscript>
      This application requires JavaScript to run properly. Please enable it in your browser.
    </noscript>

    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
